<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuRe - Sovereign Health Node</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;400;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shine: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --primary-gradient: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --text-gradient: linear-gradient(to right, #34d399, #22d3ee);
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #02040a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .font-serif { font-family: 'Fraunces', serif; }
        
        /* Noise Texture */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Rich Animated Ambient Background */
        .ambient-light {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -2;
            background: #010308;
            overflow: hidden;
        }
        .ambient-light::before {
            content: '';
            position: absolute;
            top: -30%; left: -20%;
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, rgba(6, 182, 212, 0.05) 40%, transparent 70%);
            animation: float 25s infinite ease-in-out alternate;
            border-radius: 50%;
            filter: blur(60px);
        }
        .ambient-light::after {
            content: '';
            position: absolute;
            bottom: -30%; right: -20%;
            width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(139, 92, 246, 0.05) 40%, transparent 70%);
            animation: float-reverse 30s infinite ease-in-out alternate;
            border-radius: 50%;
            filter: blur(60px);
        }
        /* Third accent orb for depth */
        .ambient-orb-3 {
            position: absolute;
            top: 50%; left: 50%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(16, 185, 129, 0.05) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse-glow 20s infinite ease-in-out;
            border-radius: 50%;
            filter: blur(80px);
        }

        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 30px); } }
        @keyframes float-reverse { 0% { transform: translate(0, 0); } 100% { transform: translate(-30px, -50px); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); } }
        
        /* Premium Glassmorphism */
        .glass-panel {
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.7) 0%, rgba(10, 10, 15, 0.8) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: linear-gradient(135deg, rgba(30, 30, 45, 0.8) 0%, rgba(15, 15, 25, 0.9) 100%);
            box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.6);
        }
        
        /* Gradient Text Utility */
        .text-gradient {
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Glass Button */
        .glass-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
            border-color: rgba(52, 211, 153, 0.5);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }

        /* Primary Action Gradient Button */
        .btn-gradient {
            background: var(--primary-gradient);
            color: #02040a;
            border: none;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.4); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #02040a; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; border: 2px solid #02040a; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        .animate-enter { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .animate-fade-out { animation: fadeOut 0.5s ease-out forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        
        /* Advanced Scanner Animation */
        .scanner-frame {
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.3);
            animation: pulse-frame 3s ease-in-out infinite;
        }
        @keyframes pulse-frame {
            0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2), inset 0 0 20px rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 50px rgba(16, 185, 129, 0.6), inset 0 0 40px rgba(16, 185, 129, 0.3); border-color: rgba(16, 185, 129, 0.8); }
        }
        
        .scanner-line {
            width: 100%; height: 4px; 
            background: linear-gradient(90deg, transparent, #34d399, transparent);
            box-shadow: 0 0 30px #10b981;
            animation: scan-erratic 2.5s linear infinite;
        }
        @keyframes scan-erratic {
            0% { transform: translateY(-20px); opacity: 0; }
            5% { opacity: 1; }
            20% { transform: translateY(50px); }
            22% { transform: translateY(45px); } /* twitch */
            25% { transform: translateY(60px); }
            45% { transform: translateY(150px); }
            46% { transform: translateY(145px); } /* stutter */
            60% { transform: translateY(250px); }
            80% { transform: translateY(350px); }
            90% { opacity: 1; }
            100% { transform: translateY(500px); opacity: 0; } 
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <div class="noise-bg"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
